<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#0e1f1a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Tasker" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" href="icon-192.png" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <title>Tasker — Task Tracker</title>
</head>
<body>
  <div class="ambient-glow"></div>

  <header class="topbar">
    <div class="topbar-inner">
      <div class="greeting">
        <span class="greeting-time" id="greetingTime">Good morning</span>
        <h1 class="greeting-date" id="greetingDate">Today</h1>
      </div>
      <button class="icon-btn" id="installBtn" aria-label="Install app" title="Install app" hidden>
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      </button>
    </div>

    <div class="stats">
      <div class="stat-card">
        <span class="stat-num" id="statTotal">0</span>
        <span class="stat-label">Total</span>
      </div>
      <div class="stat-card">
        <span class="stat-num" id="statDone">0</span>
        <span class="stat-label">Done</span>
      </div>
      <div class="stat-card">
        <span class="stat-num" id="statPending">0</span>
        <span class="stat-label">Pending</span>
      </div>
    </div>

    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <span class="progress-text" id="progressText">0% complete</span>
    </div>

    <div class="filters" role="tablist">
      <button class="filter-chip active" data-filter="all" role="tab">All</button>
      <button class="filter-chip" data-filter="pending" role="tab">Pending</button>
      <button class="filter-chip" data-filter="done" role="tab">Done</button>
    </div>
  </header>

  <main class="task-list" id="taskList"></main>

  <div class="empty-state" id="emptyState">
    <div class="empty-icon">
      <svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
    </div>
    <h2>No tasks yet</h2>
    <p>Tap the + button to add your first task</p>
  </div>

  <button class="fab" id="fabBtn" aria-label="Add new task">
    <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  </button>

  <div class="scrim" id="scrim"></div>
  <div class="bottom-sheet" id="bottomSheet" role="dialog" aria-modal="true" aria-labelledby="sheetTitle">
    <div class="sheet-handle"></div>
    <h2 class="sheet-title" id="sheetTitle">New Task</h2>

    <label class="field">
      <span class="field-label">Title</span>
      <input type="text" id="taskTitle" placeholder="What do you need to do?" maxlength="120" />
    </label>

    <label class="field">
      <span class="field-label">Notes (optional)</span>
      <textarea id="taskNotes" placeholder="Add some details..." rows="2" maxlength="500"></textarea>
    </label>

    <label class="field">
      <span class="field-label">Reminder time</span>
      <input type="datetime-local" id="taskTime" />
    </label>

    <div class="field">
      <span class="field-label">Priority</span>
      <div class="priority-row">
        <button type="button" class="priority-chip" data-priority="low">Low</button>
        <button type="button" class="priority-chip active" data-priority="medium">Medium</button>
        <button type="button" class="priority-chip" data-priority="high">High</button>
      </div>
    </div>

    <div class="sheet-actions">
      <button class="btn btn-ghost" id="cancelBtn">Cancel</button>
      <button class="btn btn-primary" id="saveBtn">Save Task</button>
    </div>
  </div>

  <div class="snackbar" id="snackbar" role="status" aria-live="polite"></div>

  <script src="app.js"></script>
</body>
</html>
